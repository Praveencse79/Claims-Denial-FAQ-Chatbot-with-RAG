services:
  api:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  slack-bot:
    build: .
    env_file:
      - .env
    command: ["python", "-m", "claims_denial_chatbot.main", "slack"]
    restart: unless-stopped
    depends_on:
      - api
